services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.2
    container_name: hyperion-es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms8g -Xmx8g
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=Vex@Elastic2026!
      - bootstrap.memory_lock=true
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 20g
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: hyperion-rabbit
    environment:
      - RABBITMQ_DEFAULT_USER=hyperion
      - RABBITMQ_DEFAULT_PASS=hyperion123
      - RABBITMQ_DEFAULT_VHOST=hyperion
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    restart: unless-stopped

  hyperion:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: hyperion-app
    network_mode: host
    depends_on:
      - elasticsearch
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./custom-abi:/app/custom-abi
    command: >
      bash -c "
        sleep 2 &&
        pm2 start pm2/ecosystem.config.cjs --only vex-indexer &&
        pm2 start pm2/ecosystem.config.cjs --only vex-api &&
        pm2 logs --raw
      "
    restart: unless-stopped

volumes:
  es-data:
  rabbit-data:
